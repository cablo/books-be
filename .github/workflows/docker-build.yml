name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Spustí se při pushi do větve main
  pull_request:
    branches: [ "main" ] # Spustí se při pull requestu do větve main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Nutné pro zápis do GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Nastavení Docker Buildx pro pokročilé kešování a multi-platformní buildy
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Přihlášení do GitHub Container Registry (využívá vestavěný token)
      - name: Log in to the Container registry
        if: github.event_name != 'pull_request' # Při PR pouze testujeme build, netlačíme do registru
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatické generování tagů (např. ghcr.io/uzivatel/projekt:main a ghcr.io/uzivatel/projekt:sha-12345)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short

      # Samotný build a push s využitím GitHub keše
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max