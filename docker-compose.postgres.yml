services:
  postgres:
    image: postgres:16-alpine
    container_name: micronaut-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
